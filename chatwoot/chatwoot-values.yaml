ingress:
  enabled: true
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/configuration-snippet: "underscores_in_headers on;"
  ingressClassName: nginx
  hosts:
    - host: chat.46-225-43-58.sslip.io
      paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              name: chatwoot
              port:
                number: 3000
  tls:
    - secretName: chatwoot-tls
      hosts:
        - chat.46-225-43-58.sslip.io

# Use external postgres and redis (deployed separately)
postgresql:
  enabled: false

redis:
  enabled: false

# postgresql.url and redis.url set via --set at install time
# rails.secretKeyBase set via --set at install time
